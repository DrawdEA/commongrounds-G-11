{% extends 'base.html' %}

{% block content %}
  <h1>{% if form.instance.pk %}Edit Book{% else %}Add a New Book{% endif %}</h1>
  
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Book</button>
  </form>

  <br>
  <a href="{% url 'bookclub:book_list' %}">Cancel</a>
{% endblock %}
