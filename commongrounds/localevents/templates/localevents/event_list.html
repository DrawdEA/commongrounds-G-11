{% extends 'base.html' %}

{% block title %}Local Events - Common Grounds{% endblock %}

{% block content %}
    <h1>Local Events</h1>
    <ul>
        {% for event in events %}
            <li><a href = "{{event.get_absolute_url}}">{{event.title}} - {{event.category}}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
