{% extends "base.html" %}

{% block title %}Common Grounds | {% if product %}Edit Product{% else %}Add Product{% endif %}{% endblock %}

{% block content %}
<h1>{% if product %}Edit Product{% else %}Add Product{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if product %}Save Changes{% else %}Create Product{% endif %}</button>
</form>
<p><a href="{% url 'merchstore:product_list' %}">Cancel</a></p>
{% endblock %}
